language: en-US

tone_instructions: >-
  Prefer questions over revert requests. Treat documented PR intent and
  companion PR references as review constraints.

reviews:
  profile: chill
  enable_prompt_for_ai_agents: false
  auto_review:
    # Keep CodeRabbit available, but do not spend automatic reviews on this repo.
    # Add the `needs-ai-review` label, or comment `@coderabbitai review`, when a
    # PR needs AI review coverage.
    enabled: false
    ignore_usernames:
      - "wcpos-bot[bot]"
    labels:
      - "needs-ai-review"
    base_branches:
      - ".*"
  path_filters:
    - "!.claude/**"
    # Translation content is generated/reviewed by the translation pipeline and
    # the Translation Completeness/Safety gates. AI reviewers must not review or
    # propose edits to localized docs.
    - "!i18n/**"
  path_instructions:
    - path: "i18n/**"
      instructions: |
        Do not review or propose edits to translation content.

        Translation files are owned by the translation pipeline and guarded by
        CI. If a translation looks wrong, do not suggest replacement copy and
        do not ask an agent to rewrite it. At most, report the exact file/line
        and recommend running the translation pipeline or the translation safety
        check.
    - path: "**"
      instructions: |
        Respect documented author intent and check for companion PRs.

        - Read the PR body before the diff. If it has sections like "Design
          decisions", "Companion PRs", "Cross-repo", or "Intent", treat them as
          the author's binding statement of design — constraints, not code to
          second-guess. Do not raise a finding that would contradict a
          documented choice.
        - Assume work often spans multiple repos in this org. "Missing caller",
          "dead code", and "unused export" findings are often wrong because
          the caller lives in a companion PR. Before flagging dead or missing
          code, check whether the PR description references companion PRs in
          other repos.
        - When author intent is unclear, ask a question rather than request a
          change.
  tools:
    markdownlint:
      enabled: true
  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
    simplify:
      enabled: false
