packages:
  - "."
minimumReleaseAge: 1440
minimumReleaseAgeIgnoreMissingTime: true
minimumReleaseAgeStrict: false
blockExoticSubdeps: true
allowBuilds:
  core-js: true
  protobufjs: true
  sharp: true
# Dependency overrides for LOCAL pnpm installs. pnpm 11 ignores package.json's
# top-level `overrides` (npm/yarn syntax) and reads them from here instead.
# These intentionally mirror package.json `overrides`, which npm honours — Vercel
# installs with npm, so keep both in sync. webpackbar 7.0.0 is required for
# compatibility with webpack 5.107+ (the 6.x ProgressPlugin options are rejected
# by the newer webpack schema).
overrides:
  serialize-javascript: "7.0.5"
  webpackbar: "7.0.0"
