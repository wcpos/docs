packages:
  - "."
minimumReleaseAge: 1440
minimumReleaseAgeIgnoreMissingTime: true
minimumReleaseAgeStrict: false
blockExoticSubdeps: true
allowBuilds:
  core-js: true
  protobufjs: true
  sharp: true
# pnpm 11 reads dependency overrides from the workspace file (not package.json).
# webpackbar 7.0.0 is required for compatibility with webpack 5.107+ (the 6.x
# ProgressPlugin options are rejected by the newer webpack schema).
overrides:
  serialize-javascript: "7.0.5"
  webpackbar: "7.0.0"
