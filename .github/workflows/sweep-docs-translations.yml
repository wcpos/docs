name: Sweep Docs Translations (self-healing)

# Periodically finds docs that are missing/stubbed in ANY locale and asks Aide
# to translate them, so a newly-added locale or any missed page self-heals
# without a human having to notice. Uses the same gap definition as the
# Translation Completeness gate (check-translation-completeness.js) and the same
# /translation/webhook path as forward-docs-translations-to-aide.yml; Aide opens
# the usual `aide/docs-translations-*` PR. Batched to bound per-run cost.

on:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Max source files to forward this run (bounds per-run translation cost)'
        required: false
        default: '8'
      dry_run:
        description: 'List the gap files but do not forward them to Aide'
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: docs-translation-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.13.1'

      - name: Install dependencies
        run: pnpm install

      - name: Generate English source translations
        run: pnpm write-translations --locale en

      - name: Find translation repair targets (batched)
        id: gaps
        env:
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '8' }}
        run: |
          AUDIT=$(node scripts/check-translation-completeness.js --audit-json)
          BATCH_TARGETS=$(node -e 'const a=JSON.parse(process.argv[1]||"[]"); const parsed=Number.parseInt(process.env.BATCH_SIZE,10); const n=parsed>0 ? Math.min(parsed, 50) : 8; process.stdout.write(JSON.stringify(a.slice(0,n)));' "$AUDIT")
          BATCH_FILES=$(node -e 'const a=JSON.parse(process.argv[1]||"[]"); process.stdout.write(JSON.stringify([...new Set(a.map((entry)=>entry.source))]));' "$BATCH_TARGETS")
          TOTAL=$(node -e 'process.stdout.write(String(JSON.parse(process.argv[1]||"[]").length));' "$AUDIT")
          {
            echo "files=$BATCH_FILES"
            echo "repair_targets=$BATCH_TARGETS"
            echo "total=$TOTAL"
            if [ "$BATCH_FILES" = "[]" ]; then echo "has_files=false"; else echo "has_files=true"; fi
          } >> "$GITHUB_OUTPUT"
          echo "Translation repair targets: $TOTAL total. Forwarding this run: $BATCH_TARGETS"

      - name: Require OpenClaw secrets
        if: steps.gaps.outputs.has_files == 'true' && github.event.inputs.dry_run != 'true'
        env:
          OPENCLAW_HOOKS_TOKEN: ${{ secrets.OPENCLAW_HOOKS_TOKEN }}
        run: |
          test -n "$OPENCLAW_HOOKS_TOKEN" || { echo "OPENCLAW_HOOKS_TOKEN secret is required"; exit 1; }

      - name: Forward gap files to Aide
        if: steps.gaps.outputs.has_files == 'true' && github.event.inputs.dry_run != 'true'
        env:
          OPENCLAW_BASE_URL: ${{ vars.OPENCLAW_BASE_URL }}
          OPENCLAW_HOOKS_TOKEN: ${{ secrets.OPENCLAW_HOOKS_TOKEN }}
          FILES_JSON: ${{ steps.gaps.outputs.files }}
          REPAIR_TARGETS_JSON: ${{ steps.gaps.outputs.repair_targets }}
        run: |
          : "${OPENCLAW_BASE_URL:=https://openclaw.wcpos.com}"
          node - <<'NODE' > /tmp/aide_payload.json
          const fs = require('node:fs');
          const payload = {
            project: 'docs',
            repo: 'wcpos/docs',
            base_ref: 'main',
            head_sha: process.env.GITHUB_SHA,
            changed_files: JSON.parse(process.env.FILES_JSON || '[]'),
            repair_targets: JSON.parse(process.env.REPAIR_TARGETS_JSON || '[]'),
            reason: 'completeness-sweep',
          };
          fs.writeFileSync('/tmp/aide_payload.json', JSON.stringify(payload));
          NODE
          curl --fail-with-body --silent --show-error \
            --connect-timeout 10 \
            --max-time 120 \
            --request POST \
            --url "$OPENCLAW_BASE_URL/translation/webhook" \
            --header "Authorization: Bearer $OPENCLAW_HOOKS_TOKEN" \
            --header "Content-Type: application/json" \
            --data @/tmp/aide_payload.json \
            --output /tmp/aide_response.json
          node - <<'NODE' /tmp/aide_response.json
          const fs = require('node:fs');
          const payload = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
          if (payload.accepted !== true || !payload.job_id || !payload.poll_url) {
            throw new Error(`Unexpected OpenClaw response: ${JSON.stringify(payload)}`);
          }
          console.log(`OpenClaw accepted docs translation sweep job ${payload.job_id}`);
          console.log(`Poll URL: ${payload.poll_url}`);
          NODE
