name: Sweep Docs Translations (self-healing)

# Periodically finds docs that are missing/stubbed/stale OR rendering raw English
# (untranslated UI props / leftover prose) in ANY locale and asks Aide to repair
# them, so a newly-added locale or any missed page self-heals without a human
# having to notice. Uses the same gap definition as the Translation Completeness
# gate (check-translation-completeness.js --audit-json), whose queue is ordered
# worst-first: pages that render raw English are forwarded before merely-missing
# pages, and missing before stale drift. Same /translation/webhook path as
# forward-docs-translations-to-aide.yml; Aide opens the usual
# `aide/docs-translations-*` PR. Batched (batch_size, default 12) to bound
# per-run cost; raise it via workflow_dispatch for a one-off backlog drain.

on:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Max source files to forward this run (bounds per-run translation cost)'
        required: false
        default: '12'
      dry_run:
        description: 'List the gap files but do not forward them to Aide'
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: docs-translation-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Find existing docs translation PR
        id: open_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OPEN_PRS_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/pulls?state=open&per_page=100" \
            --jq '[.[] | select(.head.ref | startswith("aide/docs-translations-")) | select(.head.repo.full_name == env.GITHUB_REPOSITORY) | {number, url: .html_url, head: .head.ref}]')
          COUNT=$(node -e 'const prs = JSON.parse(process.argv[1]); process.stdout.write(String(prs.length));' "$OPEN_PRS_JSON")
          if [ "$COUNT" -gt 0 ]; then
            echo "has_open_pr=true" >> "$GITHUB_OUTPUT"
            echo "Existing Aide docs translation PR(s) open; skipping new dispatch: $OPEN_PRS_JSON"
          else
            echo "has_open_pr=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.open_pr.outputs.has_open_pr != 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        if: steps.open_pr.outputs.has_open_pr != 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.13.1'

      - name: Install dependencies
        if: steps.open_pr.outputs.has_open_pr != 'true'
        run: pnpm install

      - name: Generate English source translations
        if: steps.open_pr.outputs.has_open_pr != 'true'
        run: pnpm write-translations --locale en

      - name: Find translation repair targets (batched)
        if: steps.open_pr.outputs.has_open_pr != 'true'
        id: gaps
        env:
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '12' }}
        run: |
          AUDIT_PATH="${RUNNER_TEMP:-/tmp}/translation_audit.json"
          node scripts/check-translation-completeness.js --audit-json > "$AUDIT_PATH"
          BATCH_TARGETS=$(node -e 'const fs=require("node:fs"); const a=JSON.parse(fs.readFileSync(process.argv[1],"utf8")||"[]"); const parsed=Number.parseInt(process.env.BATCH_SIZE,10); const n=parsed>0 ? Math.min(parsed, 50) : 8; process.stdout.write(JSON.stringify(a.slice(0,n)));' "$AUDIT_PATH")
          BATCH_FILES=$(node -e 'const fs=require("node:fs"); const a=JSON.parse(fs.readFileSync(process.argv[1],"utf8")||"[]"); const parsed=Number.parseInt(process.env.BATCH_SIZE,10); const n=parsed>0 ? Math.min(parsed, 50) : 8; process.stdout.write(JSON.stringify([...new Set(a.slice(0,n).map((entry)=>entry.source))]));' "$AUDIT_PATH")
          TOTAL=$(node -e 'const fs=require("node:fs"); const a=JSON.parse(fs.readFileSync(process.argv[1],"utf8")||"[]"); process.stdout.write(String(a.length));' "$AUDIT_PATH")
          {
            echo "files=$BATCH_FILES"
            echo "repair_targets=$BATCH_TARGETS"
            echo "total=$TOTAL"
            if [ "$BATCH_FILES" = "[]" ]; then echo "has_files=false"; else echo "has_files=true"; fi
          } >> "$GITHUB_OUTPUT"
          echo "Translation repair targets: $TOTAL total. Forwarding this run: $BATCH_TARGETS"

      - name: Require OpenClaw secrets
        if: steps.open_pr.outputs.has_open_pr != 'true' && steps.gaps.outputs.has_files == 'true' && github.event.inputs.dry_run != 'true'
        env:
          OPENCLAW_HOOKS_TOKEN: ${{ secrets.OPENCLAW_HOOKS_TOKEN }}
        run: |
          test -n "$OPENCLAW_HOOKS_TOKEN" || { echo "OPENCLAW_HOOKS_TOKEN secret is required"; exit 1; }

      - name: Forward gap files to Aide
        if: steps.open_pr.outputs.has_open_pr != 'true' && steps.gaps.outputs.has_files == 'true' && github.event.inputs.dry_run != 'true'
        env:
          OPENCLAW_BASE_URL: ${{ vars.OPENCLAW_BASE_URL }}
          OPENCLAW_HOOKS_TOKEN: ${{ secrets.OPENCLAW_HOOKS_TOKEN }}
          FILES_JSON: ${{ steps.gaps.outputs.files }}
          REPAIR_TARGETS_JSON: ${{ steps.gaps.outputs.repair_targets }}
        run: |
          : "${OPENCLAW_BASE_URL:=https://openclaw.wcpos.com}"
          node - <<'NODE' > /tmp/aide_payload.json
          const fs = require('node:fs');
          const payload = {
            project: 'docs',
            repo: 'wcpos/docs',
            base_ref: 'main',
            head_sha: process.env.GITHUB_SHA,
            changed_files: JSON.parse(process.env.FILES_JSON || '[]'),
            repair_targets: JSON.parse(process.env.REPAIR_TARGETS_JSON || '[]'),
            reason: 'completeness-sweep',
          };
          fs.writeFileSync('/tmp/aide_payload.json', JSON.stringify(payload));
          NODE
          curl --fail-with-body --silent --show-error \
            --connect-timeout 10 \
            --max-time 120 \
            --request POST \
            --url "$OPENCLAW_BASE_URL/translation/webhook" \
            --header "Authorization: Bearer $OPENCLAW_HOOKS_TOKEN" \
            --header "Content-Type: application/json" \
            --data @/tmp/aide_payload.json \
            --output /tmp/aide_response.json
          node - <<'NODE' /tmp/aide_response.json
          const fs = require('node:fs');
          const payload = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
          if (payload.accepted !== true || !payload.job_id || !payload.poll_url) {
            throw new Error(`Unexpected OpenClaw response: ${JSON.stringify(payload)}`);
          }
          console.log(`OpenClaw accepted docs translation sweep job ${payload.job_id}`);
          console.log(`Poll URL: ${payload.poll_url}`);
          NODE
