name: Forward Docs Translations to Aide

on:
  push:
    branches:
      - main
    paths:
      - 'versioned_docs/**/*.md'
      - 'versioned_docs/**/*.mdx'
      - 'i18n/en/**/*.json'
      - 'versioned_sidebars/**/*.json'
      - 'sidebars.js'
      - 'docusaurus.config.js'
  workflow_dispatch:
    inputs:
      files:
        description: 'Specific changed source files to forward (space or newline separated)'
        required: false
        default: ''

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: docs-translation-forward-${{ github.ref }}
  cancel-in-progress: false

jobs:
  forward:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22.13.1'

      - name: Install dependencies
        run: pnpm install

      - name: Generate English source translations
        run: pnpm write-translations --locale en

      - name: Detect changed translation source files
        id: changes
        env:
          BASE_REF: ${{ github.event.before }}
          HEAD_REF: ${{ github.sha }}
          FILES: ${{ inputs.files }}
        run: |
          FILES_JSON=$(node scripts/detect-doc-translation-changes.js)
          echo "files=$FILES_JSON" >> "$GITHUB_OUTPUT"
          if [ "$FILES_JSON" = "[]" ]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Detected files: $FILES_JSON"

      - name: Find existing docs translation PR
        if: steps.changes.outputs.has_files == 'true'
        id: open_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OPEN_PRS_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/pulls?state=open&per_page=100" \
            --jq '[.[] | select(.head.ref | startswith("aide/docs-translations-")) | select(.head.repo.full_name == env.GITHUB_REPOSITORY) | {number, url: .html_url, head: .head.ref}]')
          COUNT=$(node -e 'const prs = JSON.parse(process.argv[1]); process.stdout.write(String(prs.length));' "$OPEN_PRS_JSON")
          if [ "$COUNT" -gt 0 ]; then
            echo "has_open_pr=true" >> "$GITHUB_OUTPUT"
            echo "Existing Aide docs translation PR(s) open; skipping new dispatch: $OPEN_PRS_JSON"
          else
            echo "has_open_pr=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Require OpenClaw secrets
        if: steps.changes.outputs.has_files == 'true' && steps.open_pr.outputs.has_open_pr != 'true'
        env:
          OPENCLAW_HOOKS_TOKEN: ${{ secrets.OPENCLAW_HOOKS_TOKEN }}
        run: |
          test -n "$OPENCLAW_HOOKS_TOKEN" || { echo "OPENCLAW_HOOKS_TOKEN secret is required"; exit 1; }

      - name: Forward translation changes to Aide
        if: steps.changes.outputs.has_files == 'true' && steps.open_pr.outputs.has_open_pr != 'true'
        env:
          OPENCLAW_BASE_URL: ${{ vars.OPENCLAW_BASE_URL }}
          OPENCLAW_HOOKS_TOKEN: ${{ secrets.OPENCLAW_HOOKS_TOKEN }}
          FILES_JSON: ${{ steps.changes.outputs.files }}
          BASE_REF: ${{ github.event.before || github.ref_name }}
        run: |
          : "${OPENCLAW_BASE_URL:=https://openclaw.wcpos.com}"
          node - <<'NODE' > /tmp/aide_payload.json
          const fs = require('node:fs');
          const payload = {
            project: 'docs',
            repo: 'wcpos/docs',
            base_ref: process.env.BASE_REF || null,
            head_sha: process.env.GITHUB_SHA,
            changed_files: JSON.parse(process.env.FILES_JSON || '[]'),
          };
          fs.writeFileSync('/tmp/aide_payload.json', JSON.stringify(payload));
          NODE
          curl --fail-with-body --silent --show-error \
            --request POST \
            --url "$OPENCLAW_BASE_URL/translation/webhook" \
            --header "Authorization: Bearer $OPENCLAW_HOOKS_TOKEN" \
            --header "Content-Type: application/json" \
            --data @/tmp/aide_payload.json \
            --output /tmp/aide_response.json
          node - <<'NODE' /tmp/aide_response.json
          const fs = require('node:fs');
          const payload = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
          if (payload.accepted !== true || !payload.job_id || !payload.poll_url) {
            throw new Error(`Unexpected OpenClaw response: ${JSON.stringify(payload)}`);
          }
          console.log(`OpenClaw accepted docs translation job ${payload.job_id}`);
          console.log(`Poll URL: ${payload.poll_url}`);
          NODE
