name: Build

# Blocking guard: runs the full production `docusaurus build` (all locales) on
# every PR that touches content, config, or dependencies. This is the gate that
# catches build-breaking changes before merge — e.g. a translation whose YAML
# frontmatter contains an unquoted colon. Vercel previews are intentionally
# skipped for automated `aide/docs-translations-*` branches (see
# scripts/should-ignore-vercel-build.js), so without this job a broken build
# only surfaces on the production deploy to `main` after merge.

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'versioned_docs/**'
      - 'versioned_sidebars/**'
      - 'i18n/**'
      - 'src/**'
      - 'static/**'
      - 'docusaurus.config.*'
      - 'sidebars*'
      - 'package.json'
      - 'package-lock.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/build.yml'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.13.1'

      - name: Install dependencies
        run: pnpm install

      - name: Build website (all locales)
        run: pnpm build
