name: Build

# Blocking guard: runs the full production `docusaurus build` (all locales) on
# every PR that touches content, config, or dependencies. This is the gate that
# catches build-breaking changes before merge — e.g. a translation whose YAML
# frontmatter contains an unquoted colon. Vercel previews are intentionally
# skipped for automated `aide/docs-translations-*` branches (see
# scripts/should-ignore-vercel-build.js), so without this job a broken build
# only surfaces on the production deploy to `main` after merge.

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'versioned_docs/**'
      - 'versioned_sidebars/**'
      - 'i18n/**'
      - 'src/**'
      - 'static/**'
      - 'docusaurus.config.*'
      - 'sidebars*'
      - 'package.json'
      - 'package-lock.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/build.yml'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22.13.1'

      - name: Install dependencies
        run: pnpm install

      - name: Build website (all locales)
        run: pnpm build
