name: Translation Completeness

# Blocking guard: fails a PR when a translation ships untranslated English
# (untranslated JSX prop values, English prose left in place, stub/dropped
# locales). Runs without any API key — pure source comparison.

on:
  pull_request:
    paths:
      - 'docs/**/*.md'
      - 'docs/**/*.mdx'
      - 'versioned_docs/**/*.md'
      - 'versioned_docs/**/*.mdx'
      - 'i18n/**/*.mdx'
      - 'i18n/**/*.json'
      - 'scripts/check-translation-safety.js'
      - 'scripts/check-translation-completeness.js'
      - 'scripts/validate-frontmatter.js'

concurrency:
  group: check-translations-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  completeness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22.13.1'

      - name: Install dependencies
        run: pnpm install

      - name: Check translation completeness
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: node scripts/check-translation-completeness.js --changed

      - name: Check translation safety
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: node scripts/check-translation-safety.js

      # Single enforced quoting policy: every frontmatter `description` must be
      # double-quoted. Scoped to the PR's own changed files so a build-breaking
      # unquoted colon (or any drift back to unquoted) can never merge, without
      # dragging in the pre-existing whole-corpus backlog.
      # Auto-fix locally with: node scripts/validate-frontmatter.js --fix
      - name: Enforce frontmatter quoting policy
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: node scripts/validate-frontmatter.js --check --changed
