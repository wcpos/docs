name: Translation Completeness

# Blocking guard: fails a PR when a translation ships untranslated English
# (untranslated JSX prop values, English prose left in place, stub/dropped
# locales). Runs without any API key — pure source comparison.

on:
  pull_request:
    paths:
      - 'i18n/**/*.mdx'
      - 'i18n/**/*.json'
      - 'scripts/check-translation-safety.js'
      - 'scripts/check-translation-completeness.js'

concurrency:
  group: check-translations-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  completeness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.13.1'

      - name: Install dependencies
        run: pnpm install

      - name: Check translation completeness
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: node scripts/check-translation-completeness.js --changed

      - name: Check translation safety
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: node scripts/check-translation-safety.js
