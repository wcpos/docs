name: Translation Completeness

# Blocking guard: fails a PR when a translation ships untranslated English
# (untranslated JSX prop values, English prose left in place, stub/dropped
# locales). Runs without any API key — pure source comparison.

on:
  pull_request:
    paths:
      - 'i18n/**/*.mdx'

concurrency:
  group: check-translations-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  completeness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22.13.1'

      - name: Install dependencies
        run: pnpm install

      - name: Check translation completeness
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: node scripts/check-translation-completeness.js --changed
